---
# Seattle Housing ETL — Local Airflow Stack
# Runs Airflow 2.9 with the CeleryExecutor on Docker Compose.
#
# Services:
#   postgres      — Airflow metadata database
#   redis         — Celery broker
#   airflow-init  — One-shot: DB migration + admin user creation
#   webserver     — Airflow UI  →  http://localhost:8080
#   scheduler     — Parses DAGs, triggers task instances
#   worker        — Executes tasks (Celery worker)
#
# Usage:
#   docker compose up -d
#   docker compose down -v   # tear down including volumes

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ""          # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    # ── AWS credentials (passed from host environment) ────────────────────
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_REGION:-us-west-2}
    # ── Airflow Variables (pipeline config) ───────────────────────────────
    # These seed the Variables store on first run; you can also set them
    # in the Airflow UI under Admin → Variables.
    AIRFLOW_VAR_SEATTLE_HOUSING_S3_BUCKET: ${S3_BUCKET}
    AIRFLOW_VAR_SEATTLE_HOUSING_S3_PREFIX: ${S3_PREFIX:-seattle-housing/raw}
    AIRFLOW_VAR_SEATTLE_HOUSING_AWS_REGION: ${AWS_REGION:-us-west-2}
    AIRFLOW_VAR_SEATTLE_HOUSING_RECORD_LIMIT: "50"
    _PIP_ADDITIONAL_REQUIREMENTS: "requests>=2.31.0 pandas>=2.0.0 pyarrow>=14.0.0 boto3>=1.34.0"
  volumes:
    - /Users/elijahwooten/Desktop/Side_Projects/seattle_housing_etl/dags:/opt/airflow/dags
    - /Users/elijahwooten/Desktop/Side_Projects/seattle_housing_etl/extractor:/opt/airflow/extractor
    - /Users/elijahwooten/Desktop/Side_Projects/seattle_housing_etl/transformer:/opt/airflow/transformer
    - /Users/elijahwooten/Desktop/Side_Projects/seattle_housing_etl/loader:/opt/airflow/loader
    - /Users/elijahwooten/Desktop/Side_Projects/seattle_housing_etl/utils:/opt/airflow/utils
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow services ──────────────────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Seattle \
          --lastname ETL \
          --role Admin \
          --email admin@example.com
        echo "Airflow initialised ✅"
    restart: "no"

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.executors.celery_executor.app inspect ping -d celery@$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-db:
  airflow-logs:
  airflow-plugins:
